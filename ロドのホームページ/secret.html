<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>にゃん</title>

<style>
body {
  background: black;
  color: white;
  font-family: sans-serif;
  text-align: center;
  overflow: hidden;
  margin: 0;
}
h1 {
  margin-top: 100px;
}
</style>
</head>

<body>

<h1 id="main">・・・・・・</h1>

<script>

// ①意味深スタート
setTimeout(() => {
  document.getElementById("main").innerText = "今３回クリックしましたね";
}, 2000);

// ②怖そうにする
setTimeout(() => {
  document.body.innerHTML += "<p>ここに来たということは</p>";
}, 4000);

// ③さらにそれっぽく
setTimeout(() => {
  document.body.innerHTML += "<p>お前も好きなんだろ？</p>";
}, 6000);

// ④急に裏切る
setTimeout(() => {
  document.body.innerHTML = "<h1>にゃあああああああああああああああああああああああああああああ！！！！！！！！！！！！</h1>";
}, 8000);

// ⑤猫大量発生（ここがロド）
setTimeout(() => {
  for (let i = 0; i < 30; i++) {
    const img = document.createElement("img");
    img.src = "neko.jpg";
    img.style.position = "absolute";
    img.style.top = Math.random() * 100 + "%";
    img.style.left = Math.random() * 100 + "%";
    img.style.width = "80px";
    document.body.appendChild(img);
  }
}, 9000);

// ⑥意味不明テキスト連打
setInterval(() => {
  const p = document.createElement("p");
  p.innerText = "ﾆｬﾆｬﾆｬﾆｬﾆｬﾆｬﾆｬﾆｬ";
  p.style.position = "absolute";
  p.style.top = Math.random() * 100 + "%";
  p.style.left = Math.random() * 100 + "%";
  p.style.color = "pink";
  document.body.appendChild(p);
}, 300);

// ⑦画面揺れ
setInterval(() => {
  document.body.style.transform =
    `translate(${Math.random()*10-5}px, ${Math.random()*10-5}px)`;
}, 100);

// ⑧最終オチ（神）
setTimeout(() => {
  document.body.innerHTML = `
    <h1 style="font-size:50px;">
      猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫猫
    </h1>
  `;
}, 15000);
setTimeout(() => {
  location.href = "index.html";
}, 18000);
</script>

</body>
</html>

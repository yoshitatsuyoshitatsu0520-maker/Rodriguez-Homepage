<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ファンアートについて</title>

<style>
/* ===== 全体 ===== */
body {
  background: linear-gradient(45deg, #e6a9c0, #dcdcdc, #a8b8d8);
  background-size: 200% 200%;
  animation: bgMove 3s ease-in-out infinite alternate;

  font-family: "Comic Sans MS", cursive;
  text-align: center;

  max-width: 500px;
  margin: 0 auto;
  padding: 20px;

  min-height: 100vh; /* ←追加（安定） */
  transition: opacity 0.5s;
}

/* 背景アニメ */
@keyframes bgMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

/* ===== タイトル ===== */
h1 {
  color: white;
  text-shadow: 0 0 10px hotpink;
  margin-top: 30px;
}

/* ===== 本文カード ===== */
.box {
  background: white;
  margin: 20px auto;
  padding: 25px;

  width: 90%;
  max-width: 450px;

  border-radius: 20px;
  box-shadow: 0 0 10px pink;

  white-space: pre-line;
  line-height: 1.8;
}

/* ===== ボタン ===== */
.button {
  display: block;
  margin: 15px auto;
  width: 320px;
  height: 60px;
  line-height: 60px;

  background: white;
  color: black;
  border-radius: 20px;
  text-decoration: none;

  box-shadow: 0 0 10px pink;
  transition: 0.3s;
}

.button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px hotpink;
}

/* ===== 戻るボタン ===== */
.back {
  position: fixed;
  top: 20px;
  right: 20px;

  width: 180px;
  height: 45px;
  line-height: 45px;

  font-size: 14px;

  background: white;
  border-radius: 15px;

  box-shadow: 0 0 10px pink;
  z-index: 999;
}

/* ←これ追加（ホバー効かせる） */
.back:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px hotpink;
}

/* ===== フェード ===== */
.fadeOut {
  opacity: 0;
}

/* ===== カーソル ===== */
#rodoCursor {
  position: fixed;
  width: 60px;
  pointer-events: none;
  z-index: 9999;
}
</style>
</head>

<body>

<!-- BGM -->
<audio id="bgm" src="chiisanaomochabako.mp3" loop></audio>
<audio id="clickSE" src="cat.mp3" preload="auto"></audio>

<h1>ファンアートについて</h1>

よろしくお願いします🙇🙇🙇
</div>

<a href="chara.html" class="button">オリジナルキャラクター紹介</a>

<a href="index.html" class="button back">← トップへ戻る</a>

<img id="rodoCursor" src="neko.jpg">
<script src="common.js"></script>

</body>
</html>

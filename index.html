<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>伊藤ロドリゲスホームページ</title>

<style>
body {
  background: linear-gradient(45deg, #e6a9c0, #dcdcdc, #a8b8d8);
  background-size: 200% 200%;
  animation: fadeIn 1s forwards, bgMove 3s infinite alternate;

  font-family: "Comic Sans MS", cursive;
  text-align: center;
  margin: 0;
}

/* フェードイン */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* フェードアウト */
body.fadeOut {
  opacity: 0;
  transition: 0.5s;
}

/* 背景 */
@keyframes bgMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

/* タイトル */
h1 {
  font-size: 40px;
  color: white;
  text-shadow:
    0 0 5px pink,
    0 0 10px hotpink,
    0 0 20px hotpink;
  cursor: pointer;
}

h1:hover {
  transform: scale(1.1);
  transition: 0.3s;
}

/* ボタン */
.button {
  display: flex;
  align-items: center;
  justify-content: center;

  margin: 15px auto;
  width: 300px;
  height: 60px;

  background: white;
  color: black;
  border-radius: 20px;
  text-decoration: none;
  box-shadow: 0 0 10px pink;
  transition: 0.3s;
  font-size: 16px;
}

.button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px hotpink;
}

.button:active {
  transform: scale(0.95);
}

button.button {
  border: none;
}

/* カーソル */
#rodoCursor {
  position: fixed;
  width: 60px;
  pointer-events: none;
  z-index: 9999;
}

/* 隠しゲームボタン */
#secretGameBtn {
  position: fixed;
  bottom: 10px;
  left: 10px;
  width: 80px;
  opacity: 0.7;
  cursor: pointer;
  transition: 0.3s;
}

#secretGameBtn:hover {
  opacity: 1;
  transform: scale(1.2);
}

/* 隠し入力 */
#secretBox {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  background:black;
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 20px red;
  z-index:9999;
}

@keyframes float {
  0%   { transform: translateY(0px); }
  50%  { transform: translateY(-8px); }
  100% { transform: translateY(0px); }
}

h1{
    animation: float 3s ease-in-out infinite;
}

.heart {
  position: fixed;
  bottom: -50px;
  font-size: 24px;
  pointer-events: none;
  animation: floatHeart linear forwards;
  z-index: -1;   /* 背景に表示 */
  opacity: 0.7;
  color: white;
}

@keyframes floatHeart {
  0% {
    transform: translateY(0) scale(0.8);
    opacity: 0;
  }

  15% {
    opacity: 0.8;
  }

  100% {
    transform: translateY(-120vh) translateX(30px) scale(1.4);
    opacity: 0;
  }
}
#roroaRun{

    position:fixed;

    left:100vw;

    top:100px;

    width:180px;

    display:none;

    cursor:pointer;

    z-index:9998;

    opacity:0;

    transition:
        opacity .5s,
        transform .5s;

}
#roroaBubble{

    position:fixed;

    display:none;

    background:white;

    border-radius:20px;

    padding:12px 18px;


    font-weight:bold;

    z-index:9999;

    max-width:220px;

opacity: 0;
    transform: scale(0.8);

    transition:
        opacity .5s,
        transform .5s;
}

/* しっぽ */
#roroaBubble::after{

    content:"";

    position:absolute;

    left:40px;

    bottom:-13px;   /* ←ここを大きくすると下に下がる */

    width:0;

    height:0;

    border-left:12px solid transparent;

    border-right:12px solid transparent;

    border-top:14px solid white;

    z-index: 0;

}
</style>
</head>

<body>

<!-- 音 -->
<audio id="bgm" src="chiisanaomochabako.mp3"></audio>
<audio id="clickSE" src="cat.mp3" preload="auto"></audio>

<h1 onclick="secret()">伊藤ロドリゲスホームページ</h1>

<a href="about.html" class="button">テキトーに自己紹介</a>
<a href="sns.html" class="button">SNSリンクまとめ</a>
<a href="chara.html" class="button">オリジナルキャラクター紹介</a>
<a href="fanart.html" class="button">オリキャラファンアートについて</a>
<a href="game.html" class="button">自作ゲーム一覧</a>
<a href="request.html" class="button">有償依頼について</a>
<a href="#" class="button" onclick="uranai(); return false;">本日のロド占い</a>
<a href="mystery.html" class="button">おまけ</a>

<button class="button" onclick="collapse()">絶対に押すな</button>

<img src="neko2.jpg" id="secretGameBtn">

<!-- 隠し入力欄 -->
<div id="secretBox">
  <p style="color:white;">合言葉は？</p>
  <input id="secretInput" style="padding:10px; font-size:16px; border:none; border-radius:10px;">
  <button onclick="checkSecret()" style="margin-left:10px; padding:10px 15px; border:none; border-radius:10px;">OK</button>
</div>

<img id="rodoCursor" src="neko.jpg">
<img id="roroaRun" src="roroa.png">

<div id="roroaBubble"></div>
<script>
// 🎮 隠しゲーム
document.getElementById("secretGameBtn").addEventListener("click", () => {
  location.href = "nazogame.html";
});

// ⏳ 放置検知
let idleTimer;

function resetTimer() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(showSecret, 20000);
}

["click","mousemove","keydown","touchstart"].forEach(e=>{
  document.addEventListener(e, resetTimer);
});

resetTimer();

// 👁️ 表示
function showSecret() {
  const box = document.getElementById("secretBox");

  document.body.style.filter = "invert(1)";
  setTimeout(() => {
    document.body.style.filter = "none";
    box.style.display = "block";
  }, 200);
}

// 🔐 判定
function checkSecret() {
  const input = document.getElementById("secretInput");
  const box = document.getElementById("secretBox");

  if (input.value === "rodo") {

    document.body.innerHTML = `<h1 style="font-size:50px;">正解！</h1>`;

    setTimeout(() => {
      location.href = "https://youtu.be/JRTt19uTiVQ?si=IxKUaH9A0I0AV2tm";
    }, 1500);

  } else {
    alert("違いますｶｷ");
    box.style.display = "none";
    input.value = "";
    resetTimer();
  }
}
window.addEventListener("load",()=>{

const roroa =
document.getElementById("roroaRun");

const bubble =
document.getElementById("roroaBubble");

const lines=[

"見つかったにゃん！💕",

"くすぐったいにゃ～！",

"にゃははっ♪"

];

let roroaTimer;

function runRoroa(){

  roroa.style.opacity = "0";
bubble.style.opacity = "0";


    if(roroa.style.display === "block") return;

    roroa.style.display = "block";

    requestAnimationFrame(()=>{
    roroa.style.opacity = "1";
});

    const y =
        Math.random()*(window.innerHeight-220);

    roroa.style.top = y+"px";

    roroa.style.left = "100vw";

    roroa.animate(
    [
        { left: "100vw" },
        { left: "-300px" }
    ],
    {
        duration:5000,
        easing:"linear",
        fill:"forwards"
    });

    clearTimeout(roroaTimer);

    roroaTimer = setTimeout(()=>{
        roroa.style.display="none";
        bubble.style.display="none";
        roroa.src="roroa.png";
    },5000);

}

setInterval(()=>{

    // ←あとで好きな確率にしてOK！
    if(Math.random()<1){

        runRoroa();

    }

},30000);

roroa.onclick=()=>{

    clearTimeout(roroaTimer);

    // 走るアニメ停止
    // 今の位置を取得
// 現在位置を取得
const rect = roroa.getBoundingClientRect();

// アニメーション停止
roroa.getAnimations().forEach(a => a.cancel());

// 停止した位置で固定
roroa.style.left = rect.left + "px";
roroa.style.top = rect.top + "px";
    // 表情変更
    roroa.src="roroa2.png";

    // セリフ
    bubble.innerText =
        lines[Math.floor(Math.random()*lines.length)];

        


    let x = rect.left - 40;

    if(x < 10){
        x = 10;
    }

    bubble.style.left = x + "px";
    bubble.style.top = (rect.top - 70) + "px";

    bubble.style.display = "block";
    bubble.style.opacity = "0";
    bubble.style.transform = "scale(0.8)";

    requestAnimationFrame(()=>{
    bubble.style.opacity = "1";
    bubble.style.transform = "scale(1)";
});

   setTimeout(()=>{

    // フェードアウト
    bubble.style.opacity = "0";
    bubble.style.transform = "scale(0.8)";
    roroa.style.opacity = "0";

    setTimeout(()=>{

        bubble.style.display = "none";
        roroa.style.display = "none";

        bubble.style.opacity = "0";
        bubble.style.transform = "scale(0.8)";

        roroa.style.opacity = "0";
        roroa.style.transform = "scale(1)";

        roroa.src = "roroa.png";

    },500);

},3000);

};

}); 
</script>

<script src="common.js"></script>

</body>
</html>

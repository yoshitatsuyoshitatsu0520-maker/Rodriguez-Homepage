<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>有償依頼について</title>

<style>
body {
  background: linear-gradient(45deg, #e6a9c0, #dcdcdc, #a8b8d8);
  background-size: 200% 200%;
  animation: bgMove 3s infinite alternate;

  font-family: "Comic Sans MS", cursive;
  max-width: 700px;
  margin: 0 auto;
  text-align: center;
  color: #333;
}

@keyframes bgMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

h1 {
  margin-top: 30px;
  color: white;
  text-shadow: 0 0 10px hotpink;
}

/* セクションカード */
.card {
  background: white;
  margin: 20px auto;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 0 10px pink;
  text-align: left;
}

/* 見出し */
h2 {
  color: hotpink;
  font-size: 18px;
  margin-bottom: 10px;
}

/* ボタン */
.button {
  display: inline-block;
  margin-top: 10px;
  padding: 12px 20px;

  background: black;
  color: white;
  border-radius: 15px;
  text-decoration: none;

  transition: 0.3s;
}

.button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px hotpink;
}

/* 画像ギャラリー */
.gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

#rodoCursor {
  position: fixed;
  width: 60px;
  pointer-events: none;
  z-index: 9999;
}
.gallery img {
  width: 100%;
  border-radius: 10px;
  transition: 0.3s;
  box-shadow: 0 0 5px rgba(0,0,0,0.2);
}

.gallery img:hover {
  transform: scale(1.05);
}

/* 戻る */
.back {
  position: fixed;
  top: 20px;
  right: 20px;

  width: 180px;
  height: 45px;
  line-height: 45px;

  font-size: 14px;

  background: white;
  border-radius: 15px;

  box-shadow: 0 0 10px pink;
  text-decoration: none;
  color: black;
  z-index: 999;
}

.back:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px hotpink;
}

/* 小さい補足 */
.note {
  font-size: 12px;
  opacity: 0.7;
}

.heart {
  position: fixed;
  bottom: -50px;
  font-size: 24px;
  pointer-events: none;
  animation: floatHeart linear forwards;
  z-index: -1;   /* 背景に表示 */
  opacity: 0.7;

  color: white;
}

@keyframes floatHeart {
  0% {
    transform: translateY(0) scale(0.8);
    opacity: 0;
  }

  15% {
    opacity: 0.8;
  }

  100% {
    transform: translateY(-120vh) translateX(30px) scale(1.4);
    opacity: 0;
  }
}
</style>
</head>

<body>
<audio id="bgm" src="chiisanaomochabako.mp3"></audio>
